name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # bisa dijalankan manual dari tab Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pandas openpyxl pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "TaxInvoiceSorter" tax_invoice_sorter.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaxInvoiceSorter-Windows
          path: dist/TaxInvoiceSorter.exe
